<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6200ea" />
      <stop offset="100%" stop-color="#c2185b" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00768a" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>
  <!-- Background glow -->
  <circle cx="256" cy="256" r="240" fill="url(#glowGrad)" stroke="#00768a" stroke-width="8" opacity="0.9" />
  
  <!-- Pokéball Upper Half (Purple-Magenta) -->
  <path d="M 256,40 A 216,216 0 0,1 472,256 L 360,256 A 104,104 0 0,0 256,152 Z" fill="url(#cyberGrad)" />
  <path d="M 40,256 A 216,216 0 0,1 256,40 L 256,152 A 104,104 0 0,0 152,256 Z" fill="url(#cyberGrad)" />
  
  <!-- Pokéball Lower Half (White/Slate-white) -->
  <path d="M 40,256 A 216,216 0 0,0 256,472 L 256,360 A 104,104 0 0,1 152,256 Z" fill="#f4f6fa" />
  <path d="M 256,472 A 216,216 0 0,0 472,256 L 360,256 A 104,104 0 0,1 256,360 Z" fill="#f4f6fa" />
  
  <!-- Middle line -->
  <rect x="36" y="244" width="440" height="24" fill="#0f172a" rx="12" />
  
  <!-- Central Button outer -->
  <circle cx="256" cy="256" r="64" fill="#0f172a" />
  <!-- Central Button inner -->
  <circle cx="256" cy="256" r="40" fill="#f4f6fa" stroke="#00768a" stroke-width="6" />
  <!-- Central Core glow -->
  <circle cx="256" cy="256" r="16" fill="#fbc02d" />
  
  <!-- Neon details -->
  <circle cx="120" cy="120" r="12" fill="#00768a" opacity="0.8" />
  <circle cx="392" cy="120" r="12" fill="#00768a" opacity="0.8" />
</svg>
